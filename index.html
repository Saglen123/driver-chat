<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0d10" />
  <title>Sjåfør-chat</title>

  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: #0b0d10;
      color: #e9eef6;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100%;
    }
    input, button { font-size: 16px; }

    .app {
      max-width: 760px;
      margin: 0 auto;
      padding: 16px;
    }

    .header {
      margin-bottom: 14px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }

    .title {
      font-size: 24px;
      font-weight: 700;
      margin: 0 0 6px;
      letter-spacing: -0.02em;
    }

    .sub {
      font-size: 14px;
      opacity: 0.72;
      margin: 0;
    }

    .card {
      background: #11161f;
      border: 1px solid #202938;
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .hidden { display: none; }

    .loginGrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .searchWrap { position: relative; }

    .searchRow {
      display: grid;
      grid-template-columns: 1fr 92px;
      gap: 10px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid #2a3447;
      background: #0d1320;
      color: #e9eef6;
      outline: none;
    }

    input:focus { border-color: #4b78d1; }

    button {
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid #2a3447;
      background: #1a2332;
      color: #f3f6fb;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover { background: #202b3d; }

    .suggest {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 8px);
      z-index: 999;
      border: 1px solid #253146;
      background: #0f1420;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
      display: none;
    }

    .suggest button {
      width: 100%;
      text-align: left;
      border: 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      background: transparent;
      padding: 12px 14px;
      border-radius: 0;
      font-weight: 500;
    }

    .suggest button:last-child { border-bottom: 0; }

    .status {
      margin-top: 10px;
      font-size: 13px;
      opacity: 0.72;
    }

    .sectionTitle {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.62;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .placeName {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .tile {
      background: #0d1320;
      border: 1px solid #243044;
      border-radius: 14px;
      padding: 12px;
    }

    .tileLabel {
      font-size: 12px;
      opacity: 0.68;
      margin-bottom: 6px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .tileValue {
      font-size: 17px;
      font-weight: 700;
      word-break: break-word;
    }

    .copyBtn {
      margin-top: 8px;
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
    }

    .notes {
      background: #0d1320;
      border: 1px solid #243044;
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 14px;
    }

    .routeList {
      display: grid;
      gap: 10px;
    }

    .routeItem {
      background: #0d1320;
      border: 1px solid #243044;
      border-radius: 14px;
      padding: 12px;
    }

    .routeName {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .routeMeta {
      font-size: 14px;
      opacity: 0.9;
      line-height: 1.5;
    }

    .empty {
      opacity: 0.72;
      font-size: 15px;
    }

    @media (max-width: 640px) {
      .app { padding: 12px; }
      .title { font-size: 22px; }
      .loginGrid,
      .grid { grid-template-columns: 1fr; }
      .searchRow { grid-template-columns: 1fr 84px; }
      .placeName { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div>
        <h1 class="title">Sjåfør-chat</h1>
        <p class="sub">Søk etter sted eller regnr.</p>
      </div>
      <button id="logoutBtn" class="hidden" type="button">Logg ut</button>
    </div>

    <div id="loginCard" class="card">
      <div class="sectionTitle">Innlogging</div>
      <div class="loginGrid">
        <input id="emailInput" placeholder="E-post" autocomplete="username" />
        <input id="pinInput" placeholder="PIN" type="password" autocomplete="current-password" />
      </div>
      <div class="status" id="loginStatus"></div>
      <div style="margin-top:10px;">
        <button id="loginBtn" type="button">Logg inn</button>
      </div>
    </div>

    <div id="appCard" class="card hidden">
      <div class="sectionTitle" id="welcomeText">Innlogget</div>

      <div class="searchWrap">
        <div class="searchRow">
          <input id="searchInput" placeholder="Søk sted eller regnr" autocomplete="off" />
          <button id="searchBtn" type="button">Søk</button>
        </div>
        <div id="suggestBox" class="suggest"></div>
      </div>

      <div class="status" id="status"></div>
    </div>

    <div id="result"></div>
  </div>

  <script>
    const loginCard = document.getElementById("loginCard");
    const appCard = document.getElementById("appCard");
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const loginStatus = document.getElementById("loginStatus");
    const welcomeText = document.getElementById("welcomeText");
    const statusEl = document.getElementById("status");
    const searchInput = document.getElementById("searchInput");
    const searchBtn = document.getElementById("searchBtn");
    const suggestBox = document.getElementById("suggestBox");
    const result = document.getElementById("result");

    let suggestions = [];
    let suggestIndex = -1;
    let suggestTimer = null;

    function normalize(s) {
      return String(s || "").trim().toLowerCase();
    }

    function extractRegNr(text) {
      const m = String(text || "").toUpperCase().match(/\b([A-ZÆØÅ]{2})\s?(\d{5})\b/);
      return m ? `${m[1]}${m[2]}` : null;
    }

    async function api(path, options = {}) {
      const res = await fetch(path, {
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        ...options,
      });

      const json = await res.json().catch(() => ({}));
      return { status: res.status, ...json };
    }

    async function checkSession() {
      const res = await api("/api/me");
      if (res.ok) {
        loginCard.classList.add("hidden");
        appCard.classList.remove("hidden");
        logoutBtn.classList.remove("hidden");
        welcomeText.textContent = `Innlogget som: ${res.user.name} (${res.user.role})`;
        statusEl.textContent = "Klar.";
      } else {
        loginCard.classList.remove("hidden");
        appCard.classList.add("hidden");
        logoutBtn.classList.add("hidden");
      }
    }

    async function login() {
      loginStatus.textContent = "Logger inn…";

      const email = document.getElementById("emailInput").value.trim();
      const pin = document.getElementById("pinInput").value.trim();

      const res = await api("/api/login", {
        method: "POST",
        body: JSON.stringify({ email, pin }),
      });

      if (!res.ok) {
        loginStatus.textContent = res.error || "Innlogging feilet";
        return;
      }

      loginStatus.textContent = "";
      await checkSession();
    }

    async function logout() {
      await api("/api/logout", { method: "POST" });
      result.innerHTML = "";
      suggestBox.style.display = "none";
      await checkSession();
    }

    function renderSuggestions(items) {
      suggestions = items;
      suggestIndex = -1;

      if (!items.length) {
        suggestBox.style.display = "none";
        suggestBox.innerHTML = "";
        return;
      }

      suggestBox.innerHTML = "";
      items.forEach((item, index) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.textContent = item.label;
        btn.addEventListener("click", () => pickSuggestion(index));
        suggestBox.appendChild(btn);
      });

      suggestBox.style.display = "block";
    }

    function pickSuggestion(index) {
      const item = suggestions[index];
      if (!item) return;
      searchInput.value = item.label;
      renderSuggestions([]);
      loadLocation(item.id);
    }

    async function loadSuggestions() {
      const q = searchInput.value.trim();
      if (q.length < 2) {
        renderSuggestions([]);
        return;
      }

      const res = await api(`/api/search?q=${encodeURIComponent(q)}`);
      if (!res.ok) {
        renderSuggestions([]);
        return;
      }

      renderSuggestions(res.items || []);
    }

    async function loadLocation(id, name = "") {
      statusEl.textContent = "Laster sted…";
      renderSuggestions([]);

      const url = id
        ? `/api/location?id=${encodeURIComponent(id)}`
        : `/api/location?name=${encodeURIComponent(name)}`;

      const res = await api(url);

      if (!res.ok) {
        result.innerHTML = `<div class="card"><div class="empty">${res.error || "Fant ikke sted"}</div></div>`;
        statusEl.textContent = "";
        return;
      }

      const loc = res.location;
      const routes = loc.routes || [];

      result.innerHTML = `
        <div class="card">
          <div class="sectionTitle">Sted</div>
          <div class="placeName">${loc.name}</div>

          <div class="grid">
            <div class="tile">
              <div class="tileLabel">Portkode</div>
              <div class="tileValue">${loc.portkode || "Ikke tilgjengelig"}</div>
              ${loc.portkode ? `<button class="copyBtn" onclick="copyText('${String(loc.portkode).replace(/'/g, "\\'")}')">Kopier</button>` : ""}
            </div>

            <div class="tile">
              <div class="tileLabel">Kodelås</div>
              <div class="tileValue">${loc.kodelas || "Ikke tilgjengelig"}</div>
              ${loc.kodelas ? `<button class="copyBtn" onclick="copyText('${String(loc.kodelas).replace(/'/g, "\\'")}')">Kopier</button>` : ""}
            </div>

            <div class="tile">
              <div class="tileLabel">Alarmkode</div>
              <div class="tileValue">${loc.alarmkode || "Ikke tilgjengelig"}</div>
              ${loc.alarmkode ? `<button class="copyBtn" onclick="copyText('${String(loc.alarmkode).replace(/'/g, "\\'")}')">Kopier</button>` : ""}
            </div>

            
          </div>

          ${loc.nokkelinfo ? `
            <div class="notes">
              <div class="sectionTitle">Nøkkelinfo</div>
              <div>${loc.nokkelinfo}</div>
            </div>
          ` : ""}

          <div class="sectionTitle">Ruter</div>
          ${
            routes.length
              ? `<div class="routeList">
                  ${routes.map(r => `
                    <div class="routeItem">
                      <div class="routeName">${r.route_name || "Rute"}</div>
                      <div class="routeMeta">
                        ${r.delivery_day || r.delivery_time ? `Levering: ${r.delivery_day || ""} ${r.delivery_time || ""}<br>` : ""}
                        ${r.loading_day || r.loading_time ? `Lasting: ${r.loading_day || ""} ${r.loading_time || ""}<br>` : ""}
                        ${r.notes ? `Notat: ${r.notes}` : ""}
                      </div>
                    </div>
                  `).join("")}
                </div>`
              : `<div class="empty">Ingen rutedata funnet.</div>`
          }
        </div>
      `;

      statusEl.textContent = "";
    }

    async function loadVehicle(regnr) {
      statusEl.textContent = "Laster bil…";
      renderSuggestions([]);

      const res = await api(`/api/vehicle?regnr=${encodeURIComponent(regnr)}`);

      if (!res.ok) {
        result.innerHTML = `<div class="card"><div class="empty">${res.error || "Fant ikke bil"}</div></div>`;
        statusEl.textContent = "";
        return;
      }

      const v = res.vehicle;

      result.innerHTML = `
        <div class="card">
          <div class="sectionTitle">Bil</div>
          <div class="placeName">${v.regnr}${v.vehicle_name ? ` – ${v.vehicle_name}` : ""}</div>

          <div class="grid">
            <div class="tile">
              <div class="tileLabel">Regnr</div>
              <div class="tileValue">${v.regnr}</div>
            </div>

            <div class="tile">
              <div class="tileLabel">Dieselkortkode</div>
              <div class="tileValue">${v.fuel_card_code || "Ikke tilgjengelig"}</div>
              ${v.fuel_card_code ? `<button class="copyBtn" onclick="copyText('${String(v.fuel_card_code).replace(/'/g, "\\'")}')">Kopier</button>` : ""}
            </div>
          </div>

          ${v.notes ? `
            <div class="notes">
              <div class="sectionTitle">Notater</div>
              <div>${v.notes}</div>
            </div>
          ` : ""}
        </div>
      `;

      statusEl.textContent = "";
    }

    async function searchNow() {
      const q = searchInput.value.trim();
      if (!q) return;

      renderSuggestions([]);

      const reg = extractRegNr(q);
      if (reg) {
        await loadVehicle(reg);
        return;
      }

      await loadLocation("", q);
    }

    function debounceSuggest() {
      clearTimeout(suggestTimer);
      suggestTimer = setTimeout(loadSuggestions, 120);
    }

    function updateSuggestFocus() {
      const buttons = suggestBox.querySelectorAll("button");
      buttons.forEach((btn, i) => {
        btn.style.background = i === suggestIndex ? "rgba(255,255,255,0.06)" : "transparent";
      });
    }

    function copyText(text) {
      navigator.clipboard.writeText(text).then(() => {
        statusEl.textContent = "Kopiert ✅";
        setTimeout(() => {
          statusEl.textContent = "Klar.";
        }, 1000);
      }).catch(() => {});
    }

    searchInput.addEventListener("input", debounceSuggest);

    searchInput.addEventListener("keydown", (e) => {
      const buttons = suggestBox.querySelectorAll("button");

      if (e.key === "Enter") {
        e.preventDefault();
        if (suggestions.length && suggestIndex >= 0) {
          pickSuggestion(suggestIndex);
          return;
        }
        if (suggestions.length && suggestIndex === -1) {
          pickSuggestion(0);
          return;
        }
        searchNow();
      }

      if (e.key === "ArrowDown" && buttons.length) {
        e.preventDefault();
        suggestIndex = Math.min(suggestIndex + 1, buttons.length - 1);
        updateSuggestFocus();
      }

      if (e.key === "ArrowUp" && buttons.length) {
        e.preventDefault();
        suggestIndex = Math.max(suggestIndex - 1, 0);
        updateSuggestFocus();
      }

      if (e.key === "Escape") {
        renderSuggestions([]);
      }
    });

    document.addEventListener("click", (e) => {
      if (!suggestBox.contains(e.target) && e.target !== searchInput) {
        renderSuggestions([]);
      }
    });

    loginBtn.addEventListener("click", login);
    logoutBtn.addEventListener("click", logout);
    searchBtn.addEventListener("click", searchNow);

    window.copyText = copyText;

    checkSession();
  </script>
</body>
</html>
